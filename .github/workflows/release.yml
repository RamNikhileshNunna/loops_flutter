name: Release

# Cut a release by pushing a tag like v0.0.6 (tag a commit on main):
#
#   # bump `version:` in pubspec.yaml to 0.0.6+6 first, commit, then:
#   git tag v0.0.6
#   git push origin v0.0.6
#
# You can also trigger it manually from the Actions tab (provide the version).
# Builds split-per-ABI Android APKs + a Linux .deb, then publishes a GitHub
# Release with all artifacts attached. Auth uses the built-in GITHUB_TOKEN —
# no personal access token required.
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      version:
        description: "Version without leading v, e.g. 0.0.6"
        required: true

permissions:
  contents: write          # lets the built-in GITHUB_TOKEN create the release

env:
  FLUTTER_VERSION: "3.44.1"

jobs:
  # --------------------------------------------------------------- Version
  # Resolve the release version once (from the tag or the manual input) and
  # assert it matches pubspec.yaml, so you can't tag v0.0.6 while pubspec
  # still says 0.0.5. Downstream jobs reuse the output.
  version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.resolve.outputs.version }}
      tag: ${{ steps.resolve.outputs.tag }}
    steps:
      - uses: actions/checkout@v4

      - name: Resolve version
        id: resolve
        run: |
          if [ -n "${{ github.event.inputs.version }}" ]; then
            V="${{ github.event.inputs.version }}"   # manual run
          else
            V="${GITHUB_REF_NAME#v}"                  # tag push (strip leading v)
          fi
          echo "version=$V" >> "$GITHUB_OUTPUT"
          echo "tag=v$V"   >> "$GITHUB_OUTPUT"        # always a v-prefixed tag
          echo "Release version: $V (tag v$V)"

      - name: Assert version matches pubspec.yaml
        run: |
          V="${{ steps.resolve.outputs.version }}"
          # pubspec line looks like: version: 0.0.6+6  -> take the part before '+'
          PUBSPEC="$(grep -E '^version:' pubspec.yaml | awk '{print $2}' | cut -d'+' -f1)"
          echo "tag/input version = $V"
          echo "pubspec version   = $PUBSPEC"
          if [ "$V" != "$PUBSPEC" ]; then
            echo "::error::Version mismatch — tag/input is '$V' but pubspec.yaml is '$PUBSPEC'. Bump pubspec first."
            exit 1
          fi

  # --------------------------------------------------------------- Android
  build-android:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-java@v4
        with:
          distribution: temurin
          java-version: "17"

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build apk --release --split-per-abi

      - name: Rename APKs
        run: |
          V="${{ needs.version.outputs.version }}"
          cd build/app/outputs/flutter-apk
          mv app-arm64-v8a-release.apk   "loops-${V}-arm64-v8a.apk"
          mv app-armeabi-v7a-release.apk "loops-${V}-armeabi-v7a.apk"

      - uses: actions/upload-artifact@v4
        with:
          name: android
          path: build/app/outputs/flutter-apk/loops-*.apk
          if-no-files-found: error

  # ----------------------------------------------------------------- Linux
  build-linux:
    needs: version
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Linux build deps
        run: |
          sudo apt-get update
          sudo apt-get install -y clang cmake ninja-build pkg-config \
            libgtk-3-dev liblzma-dev libstdc++-12-dev libmpv-dev mpv fakeroot

      - uses: subosito/flutter-action@v2
        with:
          flutter-version: ${{ env.FLUTTER_VERSION }}
          channel: stable
          cache: true

      - run: flutter pub get
      - run: flutter build linux --release
      - run: bash scripts/make-deb.sh "${{ needs.version.outputs.version }}"

      - uses: actions/upload-artifact@v4
        with:
          name: linux
          path: build/deb/*.deb
          if-no-files-found: error

  # --------------------------------------------------------------- Release
  release:
    needs: [version, build-android, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Download build artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.version.outputs.tag }}
          name: Loops ${{ needs.version.outputs.version }}
          generate_release_notes: true   # auto changelog; drop for hand-written notes
          files: dist/**
